name = "com"
main = "@astrojs/cloudflare/entrypoints/server"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Session storage. wrangler auto-provisions a KV namespace on first deploy.
# After the first successful deploy, run `wrangler kv namespace list`, copy
# the id, and add `id = "..."` below so future deploys reuse it.
[[kv_namespaces]]
binding = "SESSION"

# Non-sensitive runtime config (safe to commit). Anything sensitive belongs
# elsewhere:
#   - Runtime secret (PINATA_JWT): `wrangler secret put PINATA_JWT`
#   - Build-time secret (GITHUB, used by content.config.ts at build time):
#       Dashboard -> Worker -> Settings -> Build -> "Build variables and
#       secrets" -> add as Secret.
# The IMAGES binding is added automatically by @astrojs/cloudflare.
[vars]
PUBLIC_ANALYTICS_CONTRACT = "0x29867a886F96e84196fa47DEe2Fb4a5853412C03"
PINATA_GATEWAY_URL = "cdn.iammatthias.com"
PINATA_GROUP_ID = "0196fa3e-be6b-73a6-9299-31ccaaa117e5"
